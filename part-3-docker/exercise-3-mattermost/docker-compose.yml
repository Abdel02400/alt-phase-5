services:
  postgres:
    image: postgres:15-alpine
    container_name: mm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mattermost:
    image: mattermost/mattermost-team-edition:9.11
    container_name: mm_app
    restart: unless-stopped
    ports:
      - "8065:8065"
    environment:
      # --- Connexion PostgreSQL ---
      MM_SQLSETTINGS_DRIVERNAME: postgres
      # IMPORTANT : sslmode=disable et connect_timeout=10 sont nécessaires
      # pour une connexion locale ; sans ça Mattermost tente TLS et échoue.
      MM_SQLSETTINGS_DATASOURCE: >-
        postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable&connect_timeout=10
      # --- Paramètres serveur ---
      MM_SERVICESETTINGS_SITEURL: ${MM_SITE_URL}
      MM_SERVICESETTINGS_FORWARD80TO443: "false"
      # --- Sécurité / bonnes pratiques ---
      MM_LOGSETTINGS_ENABLECONSOLE: "true"
      MM_LOGSETTINGS_CONSOLELEVEL: INFO
      MM_FILESETTINGS_DRIVERNAME: local
      MM_FILESETTINGS_DIRECTORY: /mattermost/data/
      # Désactive le mode debug en prod
      MM_SERVICESETTINGS_ENABLEDEVELOPER: "false"
      MM_SERVICESETTINGS_ENABLETESTING: "false"
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_config:/mattermost/config
      - mattermost_plugins:/mattermost/plugins
      - mattermost_client_plugins:/mattermost/client/plugins
      - mattermost_bleve:/mattermost/bleve-indexes
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8065/api/v4/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  mattermost_data:
  mattermost_logs:
  mattermost_config:
  mattermost_plugins:
  mattermost_client_plugins:
  mattermost_bleve:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
