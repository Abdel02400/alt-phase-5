input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Enrichissement basique : normalisation du timestamp
  if [host][name] {
    mutate { add_field => { "[@metadata][origin]" => "%{[host][name]}" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Index par source et par jour
    index => "logs-%{[@metadata][beat]:generic}-%{+YYYY.MM.dd}"
  }
  # Trace des événements (utile en debug, à commenter en prod)
  # stdout { codec => rubydebug }
}
