events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location /health {
            default_type application/json;
            return 200 '{"service":"order-service","status":"healthy"}';
        }

        location /api/orders {
            default_type application/json;
            return 200 '{"orders":["order-1","order-2","order-3"]}';
        }
    }
}
