events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location /health {
            default_type application/json;
            return 200 '{"service":"user-service","status":"healthy"}';
        }

        location /api/users {
            default_type application/json;
            return 200 '{"users":["john","jane","bob"]}';
        }
    }
}
